<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arun Kumar S - Web Developer Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://maxcdn.bootstrapcdn.com/font-awesome/latest/css/font-awesome.min.css" rel="stylesheet">
  <link href="css/aos.css?ver=1.1.0" rel="stylesheet">
  <link href="css/bootstrap.min.css?ver=1.1.0" rel="stylesheet">
  <link href="css/main.css?ver=1.1.0" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header Navigation -->
  <header class="header" id="header">
    <a href="#" class="logo">Port<span>folio</span></a>
    <i class="fa-solid fa-bars-staggered" id="menu-bar"></i>
    <nav class="navbar">
      <a href="#home">Home</a>
      <a href="#about-me">About me</a>
      <a href="#skills">Skills</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Home Section -->
  <section class="home" id="home">
    <div class="home-items">
      <div class="home-img">
        <img src="./images/profile.JPG" alt="Arun Kumar S" loading="lazy">
      </div>
      <h1 class="home-name"></h1>
      <h3 class="home-title"></h3>
      <a href="" class="resume-btn" target="_blank" download>
        <button class="btn resume-animated" type="button">
          <span class="resume-icon"><i class="fa-solid fa-file-arrow-down"></i></span>
          <span class="resume-text">Download Resume</span>
        </button>
      </a>
    </div>
    <div class="social-media" id="social-links">
      <!-- Social links will be dynamically loaded -->
    </div>
  </section>

  <!-- About Section -->
  <section class="about-me" id="about-me">
    <div class="blank"><h2 class="heading">About <span>Me</span></h2></div>
    <div class="about-heading">
      <div class="about-img">
        <img src="./images/about.jpg" alt="About Arun Kumar" loading="lazy">
      </div>
      <div class="about-items">
        <p class="about-bio"></p>
      </div>
    </div>
  </section>

  <!-- Skills Section -->
  <section class="skills" id="skills">
    <div class="blank">
      <h2 class="heading">Ski<span>lls</span></h2>
    </div>
    <div class="skills-container" id="skills-container">
    </div>
  </section>

  <!-- Projects Section -->
  <section class="projects" id="projects">
    <div class="blank"><h2 class="heading">My <span>Projects</span></h2></div>
    <div class="project-container" id="projects-container">
    </div>
  </section>

  <!-- Contact Section -->
  <section class="contact" id="contact">
    <div class="blank"><h2 class="heading">Cont<span>act</span></h2></div>
    <form id="contact-form" method="POST">
      <div class="form-message" id="form-message"></div>
      <div class="input-box">
        <input type="text" placeholder="Full Name" name="name" id="name" required>
        <input type="email" placeholder="Email Address" name="email" id="email" required>
      </div>
      <div class="input-box">
        <input type="tel" placeholder="Mobile Number" name="phone" id="phone" pattern="[0-9\s\-\+\(\)]+" required>
        <input type="text" placeholder="Subject" name="subject" id="subject" required>
      </div>
      <textarea name="message" id="message" cols="30" rows="10" placeholder="Your Message" required></textarea>
      <button class="btn contact-btn" type="submit" id="submit-btn">
        <span class="contact-icon"><i class="fa-solid fa-paper-plane"></i></span>
        <span class="contact-text">Send Message</span>
      </button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <div class="footer-text">
      <p>Copyright &copy; 2025 | All Rights Reserved</p>
    </div>
    <div class="footer-icon">
      <a href="#home"><i class="fa-solid fa-arrow-up"></i></a>
    </div>
  </footer>

  <script src="https://unpkg.com/scrollreveal"></script>
  <script src="app.js"></script>
</body>
</html>
